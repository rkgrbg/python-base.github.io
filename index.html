<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Code Library · rkgrbg</title>
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f4f1ea" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header" role="banner">
        <div class="brand">
          <div class="logo" aria-hidden="true">Py</div>
          <div class="titles">
            <span class="brand-kicker">Code Library</span>
            <h1>Python Library</h1>
            <p class="sub">Python · 114-2資料科學</p>
          </div>
        </div>

        <label class="search-wrap" aria-label="搜尋程式碼">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input id="searchBox" type="search" placeholder="搜尋標題、說明、標籤、程式碼內容…" spellcheck="false" />
          <button id="clearSearch" title="清除搜尋" type="button" aria-label="清除搜尋">清除</button>
        </label>
      </header>

      <main class="layout">
        <aside class="sidebar" id="sidebar">
          <nav id="categoryList" class="cat-list panel" aria-label="類別清單"></nav>

          <div class="side-foot">
            <button id="resetFilters" class="ghost line-btn side-reset" type="button">重置篩選</button>
          </div>
        </aside>

        <section class="content" aria-live="polite">
          

          <div class="toolbar panel compact">
            <div class="toolbar-main">
              <button id="toggleSidebar" class="only-mobile ghost line-btn toolbar-toggle" type="button" aria-expanded="false" aria-controls="categoryList">分類</button>
              <div class="count"><span id="resultCount">0</span> 個項目</div>
            </div>
            <div class="sort">
              <label for="sortSelect">排序</label>
              <select id="sortSelect">
                <option value="updated_desc">更新時間（新→舊）</option>
                <option value="title_asc">標題（A→Z）</option>
                <option value="title_desc">標題（Z→A）</option>
              </select>
            </div>
          </div>

          <div id="grid" class="grid" role="list"></div>
        </section>
      </main>

      <div id="modal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-dialog panel" role="document">
          <div class="modal-head">
            <div class="modal-title">
              <span id="modalId" class="code-id" aria-label="編號">CAT-000</span>
              <div>
                <h2 id="modalTitle">標題</h2>
                <div class="modal-langline">
                  <span id="modalLanguage" class="chip chip-lang"></span>
                </div>
              </div>
            </div>
            <button id="modalClose" class="icon line-btn" aria-label="關閉">✕</button>
          </div>
          <div class="modal-meta">
            <span id="modalCategory" class="chip"></span>
            <span id="modalUpdated" class="muted"></span>
            <div id="modalTags" class="tags"></div>
          </div>
          <p id="modalDesc" class="desc"></p>
          <div class="modal-actions">
            <button id="btnCopy" class="ghost line-btn">複製程式碼</button>
            <button id="btnDownload" class="ghost line-btn">下載檔案</button>
          </div>
          <pre id="modalPre" class="code-shell"><code id="modalCode" class="codeblock" aria-label="程式碼內容"></code></pre>
        </div>
        <div class="modal-backdrop"></div>
      </div>

      <footer class="site-foot">
        <span>Copyright © 2026 rkgrbg.</span>
      </footer>
    </div>

    <script src="data/codes-260319001.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
